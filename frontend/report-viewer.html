<!--
  Arc — Action Report viewer (citation drill-down demo).
  Self-contained: inline CSS/JS, no external requests. Open by double-clicking.
  In production the `report` object + its resolved `citations` come from the
  `action_report_ready` SSE event (backend enriches each citation via
  agents/orchestration/citations.py -> title/url/open_url/page/openable).
  Every citation with `openable:true` links to the exact source document
  (PDF page anchor when a page is known) — "every claim resolves", clickable.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Arc — Action Report · INC-DEMO-001</title>
<style>
  :root {
    --bg:#0b0f14; --panel:#111823; --panel2:#0e141d; --line:#1e2b3a;
    --txt:#dce6f2; --dim:#8aa0b8; --mono:#a9c7e8; --accent:#3fe0a0; --accent2:#39a0ff;
    --warn:#f0b000; --danger:#ff5f6d; --chip:#16212e;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#eef2f7; --panel:#fff; --panel2:#f5f8fc; --line:#d6e0ec;
      --txt:#0d1b2a; --dim:#5a708a; --mono:#0b3a6b; --accent:#0a9d63; --accent2:#0b6fd6;
      --warn:#9a6b00; --danger:#c02330; --chip:#eaf1f9; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  .mono { font-family:ui-monospace,SFMono-Regular,Consolas,monospace; color:var(--mono); }
  .wrap { max-width:960px; margin:0 auto; padding:28px 20px 60px; }
  header { display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:22px; }
  .brand { font-weight:700; letter-spacing:.5px; font-size:18px; }
  .brand small { color:var(--dim); font-weight:400; letter-spacing:0; }
  .spacer { flex:1; }
  .badge { padding:4px 10px; border-radius:999px; font-weight:700; font-size:12px;
    letter-spacing:.5px; text-transform:uppercase; }
  .badge.ok { background:color-mix(in srgb,var(--accent) 18%,transparent); color:var(--accent);
    border:1px solid color-mix(in srgb,var(--accent) 40%,transparent); }
  .meta { display:flex; gap:22px; flex-wrap:wrap; color:var(--dim); font-size:13px; margin-bottom:22px; }
  .meta b { color:var(--txt); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:680px){ .grid { grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .card h2 { margin:0 0 12px; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); font-weight:600; }
  .full { grid-column:1 / -1; }
  .kv { display:flex; justify-content:space-between; gap:12px; padding:6px 0; border-bottom:1px dashed var(--line); }
  .kv:last-child { border-bottom:0; }
  .kv .k { color:var(--dim); } .kv .v { text-align:right; }
  .avoided { font-size:26px; font-weight:800; color:var(--accent); }
  .action { display:flex; gap:12px; align-items:flex-start; padding:8px 0; border-bottom:1px dashed var(--line); }
  .action:last-child { border-bottom:0; }
  .prio { font-family:ui-monospace,monospace; font-weight:800; padding:2px 8px; border-radius:6px;
    background:var(--chip); border:1px solid var(--line); }
  .prio.P1 { color:var(--danger); border-color:color-mix(in srgb,var(--danger) 40%,transparent); }
  .prio.P2 { color:var(--warn); }
  .owner { color:var(--dim); font-size:12px; }
  /* citations */
  .cite { display:block; text-decoration:none; color:inherit; border:1px solid var(--line);
    border-radius:10px; padding:12px 14px; margin-bottom:10px; background:var(--panel2);
    transition:border-color .12s, transform .12s; position:relative; }
  a.cite:hover { border-color:var(--accent2); transform:translateY(-1px); }
  .cite .top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .chip { font-family:ui-monospace,monospace; font-size:12px; background:var(--chip);
    border:1px solid var(--line); border-radius:6px; padding:2px 8px; color:var(--mono); }
  .cite .title { font-weight:600; }
  .cite .pub { color:var(--dim); font-size:12px; }
  .cite .loc { color:var(--dim); font-size:12.5px; margin-top:6px; }
  .cite .snip { color:var(--txt); opacity:.85; font-style:italic; margin-top:6px;
    border-left:2px solid var(--line); padding-left:10px; }
  .open { position:absolute; top:12px; right:14px; color:var(--accent2); font-weight:700; font-size:12px; }
  .cite.dead { opacity:.55; }
  .cite.dead .open { color:var(--dim); font-weight:400; }
  .pagepill { font-family:ui-monospace,monospace; font-size:11px; background:color-mix(in srgb,var(--accent2) 16%,transparent);
    color:var(--accent2); border:1px solid color-mix(in srgb,var(--accent2) 35%,transparent); border-radius:6px; padding:1px 7px; }
  footer { color:var(--dim); font-size:12px; margin-top:26px; text-align:center; }
</style>

<div class="wrap">
  <header>
    <div class="brand">◈ ARC <small>· Network Operations — Action Report</small></div>
    <div class="spacer"></div>
    <span id="verdict" class="badge ok">confirmed</span>
  </header>

  <div class="meta" id="meta"></div>

  <div class="grid">
    <div class="card full">
      <h2>Diagnosis</h2>
      <div id="diagnosis"></div>
    </div>

    <div class="card">
      <h2>Prioritized actions</h2>
      <div id="actions"></div>
    </div>

    <div class="card">
      <h2>Cost impact</h2>
      <div id="cost"></div>
    </div>

    <div class="card">
      <h2>Part · inventory</h2>
      <div id="part"></div>
    </div>

    <div class="card">
      <h2>Crew · dispatch</h2>
      <div id="crew"></div>
    </div>

    <div class="card full">
      <h2>Sources · evidence trail <span style="color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">— click a source to open the exact document</span></h2>
      <div id="citations"></div>
    </div>
  </div>

  <footer>Arc · grounded on real telecom standards & vendor manuals · every claim resolves to its source</footer>
</div>

<script>
// --- Sample action report (in prod: from the action_report_ready SSE event) ---
const report = {
  incident_id: "INC-DEMO-001",
  site: { id: "PAR-021-NORD", name: "Paris Nord macro site", region: "IDF-North" },
  family: "energy",
  equipment: "EQ-PAR-021N-RECT-2",
  validation_result: "confirmed",
  diagnosis: { cause: "Failed or de-rated rectifier module — DC undervoltage", confidence: 0.65 },
  responder: { employee_id: "EMP-001", name: "Nadia Cherif", tier: "senior", region: "IDF-North" },
  actions: [
    { priority: "P1", action: "Replace rectifier module APR48-3G", owner: "CREW-IDF-3" },
    { priority: "P2", action: "Post-restore plant health check per procedure" }
  ],
  cost: { currency: "USD", intervention: 1165.50, avoided: 6800.00 },
  inventory: { part_no: "APR48-3G", in_stock: true, qty_available: 6, location: "WH-PAR-CENTRAL" },
  dispatch: { crew: "CREW-IDF-3", eta_hours: 0.75, booked: true },
  citations: [
    { doc_id:"V2", title:"Eltek Smartpack2 Master Controller guide", publisher:"Eltek",
      section:"3.2 DC Undervoltage Alarm", page:24,
      snippet:"the rectifier raises a DC UNDERVOLTAGE alarm when the -48V plant output falls below the configured low-voltage threshold",
      open_url:"https://stt-solutions.ie/wp-content/uploads/2016/05/350020-013_UGde_Smartpack2_Master-Ctrller_2v0.pdf#page=24", openable:true },
    { doc_id:"UFC-3-540-07", title:"UFC 3-540-07 — Generator O&M / DC plant safety", publisher:"WBDG",
      section:"Lockout/Tagout & PPE before servicing", page:24,
      snippet:"apply lockout/tagout and verify zero energy before servicing the -48V DC plant",
      open_url:"https://wbdg.org/FFC/DOD/UFC/ufc_3_540_07_2018_c1.pdf#page=24", openable:true },
    { doc_id:"S1", title:"ETSI EN 300 132-2 — -48V DC power interface", publisher:"ETSI",
      section:"4.1 NOTE 2 — voltage envelope", page:12,
      snippet:"normal -48V input range at equipment: −40.5 to −57.0 VDC",
      open_url:"https://www.etsi.org/deliver/etsi_en/300100_300199/30013202/02.08.01_60/en_30013202v020801p.pdf#page=12", openable:true },
    { doc_id:"S10", title:"ITU-T M.3100 — Generic network information model", publisher:"ITU-T",
      section:"probable-cause backup", page:null, snippet:null, open_url:null, openable:false }
  ]
};

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const usd = (n) => "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:2, maximumFractionDigits:2});

$("verdict").textContent = report.validation_result;
$("meta").innerHTML = `
  <div>Incident <b class="mono">${esc(report.incident_id)}</b></div>
  <div>Site <b class="mono">${esc(report.site.id)}</b> · ${esc(report.site.name)} · ${esc(report.site.region)}</div>
  <div>Family <b>${esc(report.family)}</b></div>
  <div>Equipment <b class="mono">${esc(report.equipment)}</b></div>`;

$("diagnosis").innerHTML = `
  <div style="font-size:16px;font-weight:600;margin-bottom:6px">${esc(report.diagnosis.cause)}</div>
  <div class="kv"><span class="k">Confidence</span><span class="v mono">${report.diagnosis.confidence.toFixed(2)}</span></div>
  <div class="kv"><span class="k">Field validation</span><span class="v" style="color:var(--accent);font-weight:700">${esc(report.validation_result).toUpperCase()}</span></div>
  <div class="kv"><span class="k">Responder notified</span><span class="v"><b class="mono">${esc(report.responder.employee_id)}</b> ${esc(report.responder.name)} · ${esc(report.responder.tier)} · ${esc(report.responder.region)}</span></div>`;

$("actions").innerHTML = report.actions.map(a => `
  <div class="action">
    <span class="prio ${esc(a.priority)}">${esc(a.priority)}</span>
    <div><div>${esc(a.action)}</div>${a.owner ? `<div class="owner">owner · <span class="mono">${esc(a.owner)}</span></div>` : ""}</div>
  </div>`).join("");

$("cost").innerHTML = `
  <div class="kv"><span class="k">Cost avoided</span><span class="v"></span></div>
  <div class="avoided">${usd(report.cost.avoided)}</div>
  <div class="kv" style="margin-top:8px"><span class="k">Intervention cost</span><span class="v mono">${usd(report.cost.intervention)} ${esc(report.cost.currency)}</span></div>`;

$("part").innerHTML = `
  <div class="kv"><span class="k">Part</span><span class="v mono">${esc(report.inventory.part_no)}</span></div>
  <div class="kv"><span class="k">In stock</span><span class="v" style="color:${report.inventory.in_stock?'var(--accent)':'var(--danger)'}">${report.inventory.in_stock?'yes':'no'} · ${report.inventory.qty_available}</span></div>
  <div class="kv"><span class="k">Warehouse</span><span class="v mono">${esc(report.inventory.location)}</span></div>`;

$("crew").innerHTML = `
  <div class="kv"><span class="k">Crew</span><span class="v mono">${esc(report.dispatch.crew)}</span></div>
  <div class="kv"><span class="k">ETA</span><span class="v">${report.dispatch.eta_hours} h</span></div>
  <div class="kv"><span class="k">Status</span><span class="v" style="color:${report.dispatch.booked?'var(--accent)':'var(--warn)'}">${report.dispatch.booked?'booked':'pending'}</span></div>`;

$("citations").innerHTML = report.citations.map(c => {
  const loc = [c.section, c.page ? `p.${c.page}` : null].filter(Boolean).map(esc).join(" · ");
  const inner = `
    <div class="top">
      <span class="chip">${esc(c.doc_id)}</span>
      <span class="title">${esc(c.title)}</span>
      <span class="pub">${esc(c.publisher||"")}</span>
      ${c.page ? `<span class="pagepill">page ${c.page}</span>` : ""}
    </div>
    ${loc ? `<div class="loc">${loc}</div>` : ""}
    ${c.snippet ? `<div class="snip">"${esc(c.snippet)}"</div>` : ""}
    <span class="open">${c.openable ? "open ↗" : "cited · not fetchable"}</span>`;
  return c.openable
    ? `<a class="cite" href="${esc(c.open_url)}" target="_blank" rel="noopener" title="Open ${esc(c.title)} at page ${c.page||'?'}">${inner}</a>`
    : `<div class="cite dead" title="Source cited but not fetchable (link-only)">${inner}</div>`;
}).join("");
</script>
